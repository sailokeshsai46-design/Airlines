<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookings - Bengaluru International Airlines</title>
<style>
  body {margin:0;font-family:Arial, sans-serif;background:#000;color:#eee;}
  header,section,footer {padding:20px;text-align:center;}
  header {background:#3b2a1a;color:#fff;}
  nav a {color:#fff;margin:0 10px;text-decoration:none;}
  h2 {color:#d2a679;}
  .booking {background:#2a2a2a;margin:20px;border-radius:8px;padding:20px;}
  form input,form select {width:90%;padding:10px;margin:5px;border:none;border-radius:4px;}
  form button {padding:10px 20px;background:#d2a679;color:#000;border:none;border-radius:4px;}
  footer {background:#3b2a1a;color:#fff;}
</style>
</head>
<body>

<header>
  <h1>Bookings</h1>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<section class="booking">
  <h2>Book Your Flight</h2>
  <img src="https://images.unsplash.com/photo-1504196606672-aef5c9cefc92?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Airplane booking" style="width:90%;max-width:400px;border-radius:8px;">
  <form>
    <input type="text" placeholder="Full Name"><br>
    <input type="email" placeholder="Email"><br>
    <input type="tel" placeholder="Phone"><br>
    <select>
      <option>Destination</option>
      <option>Bengaluru</option>
      <option>Delhi</option>
      <option>Mumbai</option>
    </select><br>
    <input type="date"><br>
    <button type="submit">Confirm Booking</button>
  </form>
  <p>For quick booking, WhatsApp us: <a href="https://wa.me/919876543210">Click Here</a></p>
</section>

<footer>
  <p>&copy; 2026 Bengaluru International Airlines</p>
</footer>

</body>
</html>
